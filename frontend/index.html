<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zays Porto</title>
    <meta name="description" content="Dashboard portofolio premium yang mengintegrasikan AI Agent dengan konversi Word ke PDF, kompresi PDF, dan pengunduh media HD." />
    <!-- Preload Hero LCP Image -->
    <link rel="preload" href="./src/assets/hero.webp" as="image" type="image/webp" fetchpriority="high" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
    <!-- Critical inline CSS: prevents FOUC and gives browser a background to paint immediately -->
    <style>
      *,::before,::after{box-sizing:border-box}
      html{font-family:Inter,system-ui,sans-serif;-webkit-text-size-adjust:100%}
      body{margin:0;background-color:#000000;color:#ffffff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      #root{min-height:100vh}
      img{display:block;max-width:100%}
      
      /* LCP Mobile Pre-render Background alignment */
      .mobile-bg-pre-render {
        position: absolute;
        top: 40px;
        left: 16px;
        right: 16px;
        height: 600px;
        border-radius: 48px;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
      }
      .mobile-bg-pre-render img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      @media (min-width: 768px) {
        .mobile-bg-pre-render {
          display: none;
        }
      }
    </style>
  </head>
  <body class="bg-midnight text-starlight antialiased">
    <div id="root">
      <!-- LCP Mobile Background Fallback: paints instantly before React hydration/mount -->
      <div class="mobile-bg-pre-render">
        <img
          src="./src/assets/hero.webp"
          alt="Background"
          width="343"
          height="361"
          fetchpriority="high"
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
